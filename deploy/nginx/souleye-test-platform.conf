server {
  listen 8088;
  server_name _;

  root /srv/souleye-test-platform/reports;
  autoindex on;

  location / {
    try_files $uri $uri/ =404;
  }
}

server {
  listen 80;
  server_name 8.129.12.60;

  location /test-reports/ {
    alias /srv/souleye-test-platform/reports/;
    autoindex on;
    auth_basic "Souleye Test Reports";
    auth_basic_user_file /etc/nginx/.souleye-test-platform.htpasswd;
  }
}
