server {
  listen 8088;
  server_name _;

  root /srv/souleye-test-platform/reports;
  autoindex on;

  location / {
    try_files $uri $uri/ =404;
  }
}

server {
  listen 80;
  server_name 8.129.12.60 mg.goods-editor.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location ~ ^/test-reports/(.*\.md)$ {
    alias /srv/souleye-test-platform/reports/$1;
    default_type "text/plain; charset=utf-8";
  }

  location /test-reports/ {
    alias /srv/souleye-test-platform/reports/;
    autoindex on;
    default_type text/plain;
    charset utf-8;
  }

  location /test-vision-inputs/ {
    alias /srv/souleye-test-platform/vision-inputs/;
    autoindex off;
    add_header X-Robots-Tag "noindex, nofollow";
    try_files $uri =404;
  }
}

server {
  listen 443 ssl;
  server_name mg.goods-editor.com;

  ssl_certificate /etc/letsencrypt/live/mg.goods-editor.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mg.goods-editor.com/privkey.pem;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location ~ ^/test-reports/(.*\.md)$ {
    alias /srv/souleye-test-platform/reports/$1;
    default_type "text/plain; charset=utf-8";
  }

  location /test-reports/ {
    alias /srv/souleye-test-platform/reports/;
    autoindex on;
    default_type text/plain;
    charset utf-8;
  }

  location /test-vision-inputs/ {
    alias /srv/souleye-test-platform/vision-inputs/;
    autoindex off;
    add_header X-Robots-Tag "noindex, nofollow";
    try_files $uri =404;
  }
}
